name: GSC SEO Report
on:
  workflow_dispatch:
jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run GSC query
        env:
          GSC_KEY: ${{ secrets.GSC_KEY }}
        run: |
          pip install google-auth requests -q
          python scripts/gsc_query.py