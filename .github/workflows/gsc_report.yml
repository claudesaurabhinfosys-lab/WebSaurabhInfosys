name: GSC SEO Report
on:
  workflow_dispatch:
jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run GSC query
        env:
          GSC_ACCESS_TOKEN: ${{ secrets.GSC_ACCESS_TOKEN }}
          GSC_REFRESH_TOKEN: ${{ secrets.GSC_REFRESH_TOKEN }}
        run: |
          pip install requests -q
          python scripts/gsc_query.py