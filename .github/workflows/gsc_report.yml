name: GSC SEO Report
on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1,4'  # Every Monday & Thursday 6AM UTC — keeps token alive
jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run GSC query
        env:
          GSC_ACCESS_TOKEN: ${{ secrets.GSC_ACCESS_TOKEN }}
          GSC_REFRESH_TOKEN: ${{ secrets.GSC_REFRESH_TOKEN }}
          GSC_CLIENT_ID: ${{ secrets.GSC_CLIENT_ID }}
          GSC_CLIENT_SECRET: ${{ secrets.GSC_CLIENT_SECRET }}
        run: |
          pip install requests -q
          python scripts/gsc_query.py