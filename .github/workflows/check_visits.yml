name: Check Today Visits
on:
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Read mysampark.com content
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash << 'REMOTE'
          echo "=== mysampark.com directory ==="
          ls /home/mysampark.com/public_html/ 2>/dev/null | head -30

          echo ""
          echo "=== index.html/php content ==="
          cat /home/mysampark.com/public_html/index.html 2>/dev/null | \
            sed 's/<[^>]*>//g' | grep -v "^$" | grep -v "^\s*$" | head -200

          echo ""
          echo "=== index.php if exists ==="
          cat /home/mysampark.com/public_html/index.php 2>/dev/null | \
            sed 's/<[^>]*>//g' | grep -v "^$" | grep -v "^\s*$" | head -100
          REMOTE
