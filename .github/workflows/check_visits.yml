name: Check Today Visits
on:
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Check live mysampark page
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash << 'REMOTE'
          echo "=== Files in public_html ==="
          ls -la /home/saurabhinfosys.com/public_html/products/mysampark/ 2>/dev/null

          echo ""
          echo "=== Content of index.html ==="
          cat /home/saurabhinfosys.com/public_html/products/mysampark/index.html 2>/dev/null | \
            grep -i "2,000\|50,000\|app store\|google play\|smarter way\|creators" | head -10

          echo ""
          echo "=== deploy.sh rsync command ==="
          cat /home/saurabhinfosys.com/deploy.sh | grep rsync
          REMOTE
