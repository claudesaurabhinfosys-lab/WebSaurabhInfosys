name: Check Today Visits
on:
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: All domains visit stats
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash << 'REMOTE'
          TODAY=$(date +%d/%b/%Y)
          echo "=== Date: $TODAY ==="
          echo ""

          for LOG in /home/saurabhinfosys.com/logs/*.access_log /home/mysampark.com/logs/*.access_log /home/myschoolmanagementsystem.com/logs/*.access_log; do
            [ -f "$LOG" ] || continue
            DOMAIN=$(basename "$LOG" .access_log)
            TOTAL=$(grep "$TODAY" "$LOG" 2>/dev/null | wc -l)
            UNIQUE=$(grep "$TODAY" "$LOG" 2>/dev/null | awk '{print $1}' | sort -u | wc -l)
            BOTS=$(grep "$TODAY" "$LOG" 2>/dev/null | grep -i -E "bot|crawl|spider|Google|Bing|baidu|yandex" | wc -l)
            HUMANS=$((TOTAL - BOTS))
            echo "--- $DOMAIN ---"
            echo "  Requests : $TOTAL"
            echo "  Unique IPs: $UNIQUE"
            echo "  Humans~  : $HUMANS"
            echo "  Bots~    : $BOTS"
            echo ""
          done

          echo "=== ALL ACCESS LOGS ON SERVER ==="
          find /home -name "*.access_log" 2>/dev/null | head -30
          REMOTE
