name: Check Today Visits
on:
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Today's visit stats
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash << 'REMOTE'
          LOG=/home/saurabhinfosys.com/logs/saurabhinfosys.com.access_log
          TODAY=$(date +%d/%b/%Y)
          echo "=== Date: $TODAY ==="
          echo ""
          echo "--- TOTAL REQUESTS TODAY ---"
          grep "$TODAY" $LOG | wc -l
          echo ""
          echo "--- UNIQUE VISITORS (IPs) ---"
          grep "$TODAY" $LOG | awk '{print $1}' | sort -u | wc -l
          echo ""
          echo "--- TOP PAGES ---"
          grep "$TODAY" $LOG | awk '{print $7}' | grep -v '\.' | sort | uniq -c | sort -rn | head -15
          echo ""
          echo "--- BOTS vs HUMANS (rough) ---"
          echo "Bots:"
          grep "$TODAY" $LOG | grep -i -E "bot|crawl|spider|Google|Bing|baidu|yandex" | wc -l
          echo "Humans (approx):"
          grep "$TODAY" $LOG | grep -i -v -E "bot|crawl|spider|baidu|yandex" | wc -l
          echo ""
          echo "--- ALL TIME TOTAL REQUESTS ---"
          wc -l < $LOG
          echo ""
          echo "--- LAST 5 REQUESTS ---"
          tail -5 $LOG | awk '{print $1, $7, $9}'
          REMOTE
