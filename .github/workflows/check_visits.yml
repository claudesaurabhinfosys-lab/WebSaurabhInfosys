name: Check Today Visits
on:
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Find log files
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "echo '=== LOG DIRS ===' && \
             find /home/saurabhinfosys.com -name '*.log' -o -name 'access*' 2>/dev/null | head -20 && \
             echo '=== /var/log apache ===' && \
             ls /var/log/apache2/ 2>/dev/null || ls /var/log/httpd/ 2>/dev/null || echo 'no apache logs' && \
             echo '=== HOME LOGS ===' && \
             ls /home/saurabhinfosys.com/logs/ 2>/dev/null || echo 'no logs dir' && \
             echo '=== LATEST LINE IN ACCESS LOG ===' && \
             tail -2 /home/saurabhinfosys.com/logs/access_log 2>/dev/null || \
             tail -2 /usr/local/apache/domlogs/saurabhinfosys.com 2>/dev/null || echo 'not found'"
