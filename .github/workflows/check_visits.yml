name: Check Today Visits
on:
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Check campaign routes and status
        env:
          TOKEN: ${{ secrets.SOCIALADMIN_TOKEN }}
        run: |
          echo "=== Campaign API routes ==="
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "grep -i 'campaign' /home/mysampark.com/public_html/socialadmin/routes/api.php"

          echo ""
          echo "=== Campaign list attempt ==="
          curl -s -X GET "https://socialadmin.mysampark.com/api/campaign/list" \
            -H "Accept: application/json" \
            -H "Authorization: Bearer $TOKEN" | head -c 2000

          echo ""
          echo "=== Posts list ==="
          curl -s -X GET "https://socialadmin.mysampark.com/api/post" \
            -H "Accept: application/json" \
            -H "Authorization: Bearer $TOKEN" | head -c 2000
