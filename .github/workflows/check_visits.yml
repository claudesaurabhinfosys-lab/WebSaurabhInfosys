name: Check Today Visits
on:
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Count today's visits
        run: |
          TODAY=$(date +%d/%b/%Y)
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "echo '=== TOTAL HITS TODAY ===' && \
             grep '$TODAY' /home/saurabhinfosys.com/logs/access_log 2>/dev/null | wc -l && \
             echo '=== UNIQUE IPs ===' && \
             grep '$TODAY' /home/saurabhinfosys.com/logs/access_log 2>/dev/null | awk '{print \$1}' | sort -u | wc -l && \
             echo '=== TOP PAGES ===' && \
             grep '$TODAY' /home/saurabhinfosys.com/logs/access_log 2>/dev/null | awk '{print \$7}' | sort | uniq -c | sort -rn | head -10 && \
             echo '=== TOP COUNTRIES (via IP ranges rough) ===' && \
             grep '$TODAY' /home/saurabhinfosys.com/logs/access_log 2>/dev/null | awk '{print \$1}' | sort | uniq -c | sort -rn | head -10"
