name: Check Today Visits
on:
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check campaign status
        env:
          TOKEN: ${{ secrets.SOCIALADMIN_TOKEN }}
        run: |
          echo "=== Campaign 10 status ==="
          curl -s "https://socialadmin.mysampark.com/api/campaign/10" \
            -H "Accept: application/json" \
            -H "Authorization: Bearer $TOKEN"
          echo ""
          echo "=== All recent campaigns ==="
          curl -s "https://socialadmin.mysampark.com/api/campaign?per_page=5" \
            -H "Accept: application/json" \
            -H "Authorization: Bearer $TOKEN"
