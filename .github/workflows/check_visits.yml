name: Check Today Visits
on:
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Read all home sections
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash << 'REMOTE'
          COMP=/home/mysampark.com/public_html/components/Home

          echo "=== All home components ==="
          ls $COMP/section/ 2>/dev/null

          for f in $COMP/section/*.tsx; do
            echo ""
            echo "====== $f ======"
            cat "$f" 2>/dev/null
          done

          echo ""
          echo "====== Main page.tsx ======"
          cat /home/mysampark.com/public_html/app/\(main\)/page.tsx 2>/dev/null
          REMOTE
