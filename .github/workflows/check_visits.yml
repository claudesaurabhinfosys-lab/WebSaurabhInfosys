name: Check Today Visits
on:
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Check deploy script and logs
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash << 'REMOTE'
          echo "=== deploy.sh full ==="
          cat /home/saurabhinfosys.com/deploy.sh

          echo ""
          echo "=== last 30 lines of deploy.log ==="
          tail -30 /home/saurabhinfosys.com/logs/deploy.log 2>/dev/null || echo "no log"

          echo ""
          echo "=== public_html modification times (top level) ==="
          ls -la /home/saurabhinfosys.com/public_html/ | head -20
          REMOTE
