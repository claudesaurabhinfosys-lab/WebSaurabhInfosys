name: Check Today Visits
on:
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Copy logo from server and commit to repo
        run: |
          scp -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/mysampark.com/public_html/public/saurabhInfosys.webp \
            public/saurabhInfosys.webp

          echo "File size: $(ls -lh public/saurabhInfosys.webp)"

          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add public/saurabhInfosys.webp
          git commit -m "feat: add Saurabh Infosys logo to public folder"
          git push
