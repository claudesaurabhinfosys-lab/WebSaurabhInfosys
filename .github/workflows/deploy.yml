name: Build & Deploy to saurabhinfosys.com

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy via rsync
        run: |
          rsync -av --delete \
            --exclude='.htaccess' \
            --exclude='extract.php' \
            --exclude='phptest.php' \
            --exclude='deploy-webhook.php' \
            --exclude='4e472060b5dd251fff9f2f80eefa8bdb.txt' \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
            out/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/saurabhinfosys.com/public_html/
